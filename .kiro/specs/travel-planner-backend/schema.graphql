# Enums
enum TripStatus {
  DRAFT
  PLANNED
  SHARED
}

enum BudgetTier {
  BUDGET
  MID_RANGE
  LUXURY
}

enum TravellerRole {
  ORGANIZER
  FRIEND
}

# Core Types
type Trip {
  id: ID!
  title: String!
  description: String
  status: TripStatus!
  startDate: String!
  endDate: String!
  destinations: [Destination!]!
  travellers: [Traveller!]!
  itinerary: Itinerary
  budgetBreakdown: BudgetBreakdown
  createdAt: String!
  updatedAt: String!
}

type Destination {
  id: ID!
  name: String!
  country: String!
  arrivalDate: String!
  departureDate: String!
  description: String
}

type Itinerary {
  id: ID!
  tripId: ID!
  days: [ItineraryDay!]!
  createdAt: String!
}

type ItineraryDay {
  id: ID!
  date: String!
  dayNumber: Int!
  activities: [Activity!]!
}

type Activity {
  id: ID!
  title: String!
  description: String
  startTime: String!
  endTime: String!
  location: String
  estimatedCost: Float
  currency: String
}

type Traveller {
  id: ID!
  name: String!
  email: String!
  role: TravellerRole!
  joinedAt: String!
}

type BudgetBreakdown {
  totalBudget: Float!
  currency: String!
  tier: BudgetTier!
  categories: [BudgetCategory!]!
}

type BudgetCategory {
  name: String!
  amount: Float!
  currency: String!
}

# Input Types
input CreateTripInput {
  title: String!
  description: String
  startDate: String!
  endDate: String!
  budgetTier: BudgetTier
}

input AddTravellerInput {
  tripId: ID!
  name: String!
  email: String!
  role: TravellerRole!
}

input PlanItineraryInput {
  tripId: ID!
  preferences: String
}

# Queries
type Query {
  getTrip(id: ID!): Trip
  suggestDestinations(query: String!, budget: Float, currency: String): [Destination!]!
  generateItinerary(input: PlanItineraryInput!): Itinerary
}

# Mutations
type Mutation {
  createTrip(input: CreateTripInput!): Trip!
  updateTrip(id: ID!, input: CreateTripInput!): Trip!
  addTraveller(input: AddTravellerInput!): Trip!
  removeTraveller(tripId: ID!, travellerId: ID!): Trip!
  sendTripEmail(tripId: ID!, recipientEmail: String!): Boolean!
}
