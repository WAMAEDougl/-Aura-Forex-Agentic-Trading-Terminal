# GraphQL Mutations for Trips
# Place this file in: apps/ui/src/graphql/mutations/trips.graphql

mutation CreateTrip($input: CreateTripInput!) {
  createTrip(input: $input) {
    id
    title
    description
    status
    startDate
    endDate
    createdAt
    updatedAt
    travellers {
      id
      name
      email
      role
      joinedAt
    }
  }
}

mutation UpdateTrip($id: ID!, $input: UpdateTripInput!) {
  updateTrip(id: $id, input: $input) {
    id
    title
    description
    status
    startDate
    endDate
    updatedAt
  }
}

mutation AddTraveller($input: AddTravellerInput!) {
  addTraveller(input: $input) {
    id
    travellers {
      id
      name
      email
      role
      joinedAt
    }
  }
}

mutation RemoveTraveller($tripId: ID!, $travellerId: ID!) {
  removeTraveller(tripId: $tripId, travellerId: $travellerId) {
    id
    travellers {
      id
      name
      email
      role
    }
  }
}

mutation SendTripEmail($tripId: ID!, $recipientEmail: String!) {
  sendTripEmail(tripId: $tripId, recipientEmail: $recipientEmail)
}
