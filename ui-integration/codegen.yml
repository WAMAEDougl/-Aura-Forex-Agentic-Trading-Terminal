# GraphQL Code Generator Configuration
# Place this file in: apps/ui/codegen.yml

schema: "../../travel-planner-backend/schema.graphql"
documents: "src/graphql/**/*.graphql"
generates:
  src/graphql/generated/graphql.ts:
    plugins:
      - typescript
      - typescript-operations
      - typescript-react-apollo
    config:
      withHooks: true
      withComponent: false
      withHOC: false
      typesPrefix: ""
      scalars:
        DateTime: string
      # Ensure compatibility with shared types
      avoidOptionals:
        field: false
        inputValue: false
        object: false
      maybeValue: T | null
